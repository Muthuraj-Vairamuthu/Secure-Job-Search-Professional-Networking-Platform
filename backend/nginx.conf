# ======================================================
# Nginx Configuration — TLS Termination Reverse Proxy
# CSE 345/545 Secure Job Search Platform — FCS Group 19
# ======================================================
#
# This config provides HTTPS (TLS 1.2/1.3) in front of the
# Gunicorn/Flask backend running on localhost:8000.
#
# Usage:
#   1. Place this file at /etc/nginx/conf.d/fcs_group19.conf
#      or symlink it into /etc/nginx/sites-enabled/
#   2. Copy certs/server.crt and certs/server.key to /etc/nginx/ssl/
#   3. sudo nginx -t && sudo systemctl reload nginx
#   4. Access the app at https://localhost
#
# For production, replace self-signed certs with CA-signed ones.

server {
    listen 80;
    server_name localhost;
    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name localhost;

    # ── TLS Configuration ──
    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security Headers ──
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── API Reverse Proxy ──
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # Prevent buffering for streaming responses
        proxy_buffering off;
    }

    # ── Frontend Static Files ──
    location / {
        root /Users/aditya/temp/vm/submission2/frontend/public;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /css/ {
        alias /Users/aditya/temp/vm/submission2/frontend/css/;
    }

    location /js/ {
        alias /Users/aditya/temp/vm/submission2/frontend/js/;
    }

    location /images/ {
        alias /Users/aditya/temp/vm/submission2/frontend/images/;
    }

    # ── Error Pages ──
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
